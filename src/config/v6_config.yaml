# Code-Trainer V6 Configuration
# Hardware: RTX 5060 Ti 16GB (Single GPU)

# Phase 1: Data Collection
data_collection:
  github_token: ${GITHUB_TOKEN}
  repos_dir: ./data/sample-data/repositories
  captures_dir: ./data/sample-data/captures
  catalog_db: ./data/catalog.db
  repos_per_language: 500
  min_quality_score: 30
  languages:
    - Python
    - JavaScript
    - TypeScript
    - Java
    - Go
    - Rust
    - C++
    - C#
  capture_workers: 8
  viewport_width: 2560
  viewport_height: 1440
  font_size: 14
  theme: "Default Dark+"

# Phase 2: Preprocessing
preprocessing:
  dataset_name: cmndcntrlcyber/code-trainer-offsec-dataset
  max_code_length: 8192
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  private: true
  # Multimodal build: max pixel dimension for base64 WebP images on the `v2-multimodal` branch.
  # 1024 keeps dataset ~2 GB for 32k samples while preserving text readability for larger
  # future vision encoders (Swin-L, SigLIP). Swin-B input is 224 so the feature extractor
  # downscales anyway — this value is about Hub storage vs. future flexibility.
  image_max_dim: 1024
  multimodal_revision: "v2-multimodal"

# Phase 3: Vision Model (HF Skills A100 — cloud)
vision_model:
  # Device profile switches between local 5060 Ti (INT4 + 8bit optim) and A100 (full BF16).
  # Valid values: "a100" | "5060ti"
  device_profile: "a100"

  vision_encoder: "microsoft/swin-base-patch4-window7-224"
  decoder: "Qwen/Qwen2.5-Coder-1.5B-Instruct"

  # Cloud dataset (multimodal revision with base64 WebP images)
  dataset_id: "cmndcntrlcyber/code-trainer-offsec-dataset"
  dataset_revision: "v2-multimodal"

  # A100 profile
  batch_size: 8
  gradient_accumulation: 4
  learning_rate: 2e-4
  num_epochs: 3
  max_seq_length: 2048
  compute_dtype: "bfloat16"
  gradient_checkpointing: true
  use_8bit_optimizer: false      # A100 has VRAM for fused AdamW
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  output_dir: ./models/vision_model

  # HF Jobs cloud-job settings (HfApi.run_job — NOT AutoTrain)
  cloud:
    hardware: "a100-large"
    wandb_project: "rtpi-phase3-vision"
    adapter_repo: ${HF_USERNAME}/code-trainer-vision-adapter
    timeout_seconds: 36000       # 10h ceiling
    poll_interval: 60
    # Docker image used for the job. The huggingface/transformers-pytorch-gpu
    # image ships CUDA + torch + transformers. `uv sync --frozen` inside the
    # job reconciles the rest of pyproject.toml.
    image: "huggingface/transformers-pytorch-gpu:latest"
    # Public repo cloned at job start. No GH token needed while public.
    repo_url: "https://github.com/cmndcntrlcyber/code-trainer-offsec-pipeline.git"
    repo_ref: "main"

# Phase 4: Qwen Fine-tuning (HF Skills Cloud — HF Jobs, mirrors Phase 3 pattern)
qwen_finetuning:
  model: "Qwen/Qwen2.5-Coder-14B-Instruct"
  hardware: "a100-large"

  # Text-only dataset (the main branch — no images needed for decoder fine-tuning)
  dataset_id: "cmndcntrlcyber/code-trainer-offsec-dataset"
  dataset_revision: "main"

  # Common training knobs (overridden per sweep config below)
  num_epochs_sweep: 1
  max_seq_length: 2048

  validation_sweep:
    - name: conservative
      lora_r: 16
      lora_alpha: 32
      learning_rate: 1.5e-4
      batch_size: 1
      gradient_accumulation: 16
    - name: standard
      lora_r: 32
      lora_alpha: 64
      learning_rate: 2e-4
      batch_size: 2
      gradient_accumulation: 8
    - name: aggressive
      lora_r: 64
      lora_alpha: 128
      learning_rate: 3e-4
      batch_size: 4
      gradient_accumulation: 4
  full_training:
    num_epochs: 3
    top_n_configs: 2
  output_base: ${HF_USERNAME}/qwen14b-code-trainer-v6

  # HF Jobs cloud-job settings — same shape as vision_model.cloud
  cloud:
    hardware: "a100-large"
    wandb_project: "rtpi-phase4-qwen14b"
    adapter_base: ${HF_USERNAME}/qwen14b-code-trainer-v6
    timeout_seconds: 14400        # 4h per sweep job ceiling
    poll_interval: 60
    image: "huggingface/transformers-pytorch-gpu:latest"
    repo_url: "https://github.com/cmndcntrlcyber/code-trainer-offsec-pipeline.git"
    repo_ref: "main"
    # Catastrophic-forgetting check (Ready Tensor capstone requirement). Run
    # via launch_benchmark.py with --adapter <repo> [--baseline]. GSM8K is the
    # default — math reasoning is orthogonal to screenshot-to-code, so it
    # cleanly detects forgetting on a 14B coder model.
    benchmark:
      task: "gsm8k"
      num_fewshot: 0
      batch_size: 16
      timeout_seconds: 2400          # 40m HF runtime cap
      wait_timeout_seconds: 7200     # 2h local poll budget

# Phase 5: Deployment — GGUF conversion runs on HF Jobs (a100-large for the
# 144 GB RAM, not the GPU). Local llama.cpp serving is configured in
# src/phase6_inference/. The local converter scripts under gguf/ are kept
# for offline conversion when needed.
deployment:
  quantization: "Q4_K_M"
  context_length: 4096
  port: 8080
  gguf_repo: ${HF_USERNAME}/qwen14b-code-trainer-v6-gguf

  # Source adapter for Phase 5 conversion. Locked to Phase 4A aggressive
  # (eval_loss 0.4724 on full val) per docs/sweep/phase4b-summary.md —
  # outperformed Phase 4B's 3-epoch slice (0.5126).
  source_adapter: ${HF_USERNAME}/qwen14b-code-trainer-v6-aggressive
  base_model: "Qwen/Qwen2.5-Coder-14B-Instruct"

  # HF Jobs cloud-job settings — same shape as vision_model.cloud
  cloud:
    hardware: "a100-large"
    timeout_seconds: 7200          # HF runtime cap once job is RUNNING
    wait_timeout_seconds: 21600    # Local launcher --wait budget (queue + run, 6h)
    poll_interval: 60
    image: "huggingface/transformers-pytorch-gpu:latest"
    repo_url: "https://github.com/cmndcntrlcyber/code-trainer-offsec-pipeline.git"
    repo_ref: "main"
    # Quantization levels to produce + upload. Q4_K_M is the architecture-doc
    # recommendation for the coder hot-swap target. Add Q5_K_M / Q8_0 if you
    # want quality variants alongside.
    quants:
      - "Q4_K_M"
